name: Build Thread Border Router Artifact

on:
  workflow_dispatch:
    inputs:
      idf_ref:
        description: "ESP-IDF ref to build against (for example: v5.5.4, release/v5.5)"
        required: true
        default: "v5.5.4"
      br_ref:
        description: "esp-thread-br ref to build against (for example: v1.3, main)"
        required: true
        default: "v1.3"
      flash_size:
        description: "Target flash size"
        required: true
        default: "8mb"
        type: choice
        options:
          - "8mb"
          - "4mb"
      mode:
        description: "Backhaul mode"
        required: true
        default: "wifi"
        type: choice
        options:
          - "wifi"
          - "ethernet"
      wifi_setup:
        description: "Wi-Fi setup mode; ignored when backhaul mode is ethernet"
        required: true
        default: "softap"
        type: choice
        options:
          - "softap"
          - "credentials"
      wifi_ssid:
        description: "Wi-Fi SSID when wifi_setup is credentials"
        required: false
        default: ""
      wifi_password:
        description: "Wi-Fi password for Wi-Fi firmware builds; leave empty for open networks"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build_artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            wget \
            flex \
            bison \
            gperf \
            cmake \
            ninja-build \
            ccache \
            libffi-dev \
            libssl-dev \
            dfu-util \
            python3 \
            python3-pip \
            python3-venv \
            xz-utils

      - name: Clone ESP-IDF
        env:
          IDF_REF: ${{ inputs.idf_ref }}
        run: |
          git clone --recursive --depth 1 --branch "$IDF_REF" https://github.com/espressif/esp-idf.git "$GITHUB_WORKSPACE/esp-idf"
          git -C "$GITHUB_WORKSPACE/esp-idf" describe --always --tags --match='v*.*' > "$GITHUB_WORKSPACE/esp-idf/version.txt"

      - name: Apply ESP-IDF netif descriptions patch
        run: |
          git -C "$GITHUB_WORKSPACE/esp-idf" apply "$GITHUB_WORKSPACE/patches/idf-netif-descriptions.patch"

      - name: Apply ESP-IDF Wi-Fi reconnect patch
        if: inputs.mode == 'wifi'
        run: |
          git -C "$GITHUB_WORKSPACE/esp-idf" apply "$GITHUB_WORKSPACE/patches/idf-wifi-infinite-reconnect.patch"

      - name: Install ESP-IDF tools
        run: |
          "$GITHUB_WORKSPACE/esp-idf/install.sh" esp32s3 esp32h2

      - name: Clone ESP Thread BR
        env:
          BR_REF: ${{ inputs.br_ref }}
        run: |
          git clone --recursive --depth 1 --branch "$BR_REF" https://github.com/espressif/esp-thread-br.git "$GITHUB_WORKSPACE/esp-thread-br"

      - name: Stage clean build tree
        run: |
          set -euo pipefail
          workdir="$GITHUB_WORKSPACE/esp-thread-br-src"
          rm -rf "$workdir"
          mkdir -p "$workdir"
          git -C "$GITHUB_WORKSPACE/esp-thread-br" archive --format=tar HEAD | tar -C "$workdir" -xf -

      - name: Patch example configuration
        env:
          FLASH_SIZE: ${{ inputs.flash_size }}
          MODE: ${{ inputs.mode }}
          WIFI_SETUP: ${{ inputs.wifi_setup }}
          WIFI_SSID: ${{ inputs.wifi_ssid }}
          WIFI_PASSWORD: ${{ inputs.wifi_password }}
        run: |
          if [ "$MODE" = "wifi" ] && [ "$WIFI_SETUP" = "credentials" ]; then
            [ -n "$WIFI_SSID" ] || { echo "wifi_ssid is required when mode=wifi and wifi_setup=credentials" >&2; exit 1; }
            echo "::add-mask::$WIFI_SSID"
            [ -z "$WIFI_PASSWORD" ] || echo "::add-mask::$WIFI_PASSWORD"
          fi

          python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import re

          workdir = Path(os.environ["GITHUB_WORKSPACE"]) / "esp-thread-br-src"
          project_dir = workdir / "examples" / "basic_thread_border_router"
          sdkconfig_path = project_dir / "sdkconfig.defaults"
          source_path = project_dir / "main" / "esp_ot_br.c"
          version_cmake = Path(os.environ["GITHUB_WORKSPACE"]) / "esp-idf" / "tools" / "cmake" / "version.cmake"

          flash_size = os.environ["FLASH_SIZE"]
          mode = os.environ["MODE"]
          wifi_setup = os.environ["WIFI_SETUP"]
          wifi_ssid = os.environ["WIFI_SSID"]
          wifi_password = os.environ["WIFI_PASSWORD"]

          version_matches = dict(
              re.findall(r"set\(IDF_VERSION_(MAJOR|MINOR|PATCH)\s+(\d+)\)", version_cmake.read_text())
          )
          major, minor, patch = (int(version_matches[key]) for key in ("MAJOR", "MINOR", "PATCH"))
          source = source_path.read_text()
          hostname_match = re.search(r'mdns_hostname_set\("([^"]+)"\)', source)
          if not hostname_match:
              raise RuntimeError(f"Could not extract upstream mDNS hostname from {source_path}")
          upstream_hostname = hostname_match.group(1)

          if major >= 6:
              ipv6_num_addresses = 12
          elif major == 5 and minor >= 4:
              ipv6_num_addresses = 12
          elif major == 5 and minor == 3 and patch >= 1:
              ipv6_num_addresses = 12
          elif major == 5 and minor == 2 and patch >= 3:
              ipv6_num_addresses = 12
          elif major == 5 and minor == 1 and patch >= 5:
              ipv6_num_addresses = 12
          else:
              ipv6_num_addresses = 8

          lines = sdkconfig_path.read_text().splitlines()

          def drop_prefix(prefixes):
              kept = []
              for line in lines:
                  if any(line.startswith(prefix) for prefix in prefixes):
                      continue
                  if any(line == prefix for prefix in prefixes):
                      continue
                  kept.append(line)
              return kept

          lines = drop_prefix([
              "CONFIG_ESPTOOLPY_FLASHSIZE_",
              "CONFIG_EXAMPLE_CONNECT_WIFI=",
              "CONFIG_EXAMPLE_CONNECT_ETHERNET=",
              "CONFIG_EXAMPLE_WIFI_SSID=",
              "CONFIG_EXAMPLE_WIFI_PASSWORD=",
              "CONFIG_EXAMPLE_WIFI_CONN_MAX_RETRY=",
              "# CONFIG_EXAMPLE_CONNECT_WIFI is not set",
              "# CONFIG_EXAMPLE_CONNECT_ETHERNET is not set",
              "CONFIG_OPENTHREAD_BR_AUTO_START=",
              "CONFIG_OPENTHREAD_BR_START_WEB=",
              "CONFIG_OPENTHREAD_BR_SOFTAP_SETUP=",
              "# CONFIG_OPENTHREAD_BR_SOFTAP_SETUP is not set",
              "CONFIG_LWIP_IPV6_NUM_ADDRESSES=",
              "CONFIG_LWIP_LOCAL_HOSTNAME=",
          ])

          if flash_size == "4mb":
              lines.append("CONFIG_ESPTOOLPY_FLASHSIZE_4MB=y")
          else:
              lines.append("CONFIG_ESPTOOLPY_FLASHSIZE_8MB=y")

          if mode == "ethernet":
              lines.append("# CONFIG_EXAMPLE_CONNECT_WIFI is not set")
              lines.append("CONFIG_EXAMPLE_CONNECT_ETHERNET=y")
          else:
              lines.append("CONFIG_EXAMPLE_CONNECT_WIFI=y")
              lines.append("# CONFIG_EXAMPLE_CONNECT_ETHERNET is not set")
              lines.append("CONFIG_EXAMPLE_WIFI_CONN_MAX_RETRY=-1")

              if wifi_setup == "softap":
                  lines.append("CONFIG_OPENTHREAD_BR_SOFTAP_SETUP=y")
              else:
                  if not wifi_ssid:
                      raise RuntimeError("wifi_ssid is required when mode=wifi and wifi_setup=credentials")
                  lines.append(f"CONFIG_EXAMPLE_WIFI_SSID={json.dumps(wifi_ssid)}")
                  lines.append(f"CONFIG_EXAMPLE_WIFI_PASSWORD={json.dumps(wifi_password)}")
                  lines.append("# CONFIG_OPENTHREAD_BR_SOFTAP_SETUP is not set")

          lines.append("CONFIG_OPENTHREAD_BR_AUTO_START=y")
          lines.append("CONFIG_OPENTHREAD_BR_START_WEB=y")

          lines.append(f"CONFIG_LWIP_IPV6_NUM_ADDRESSES={ipv6_num_addresses}")
          lines.append(f'CONFIG_LWIP_LOCAL_HOSTNAME="{upstream_hostname}"')

          sdkconfig_path.write_text("\n".join(lines) + "\n")

          if flash_size == "4mb":
              partitions_path = project_dir / "partitions.csv"
              partitions_path.write_text(
                  "# Name,   Type, SubType, Offset,  Size, Flags\n"
                  "nvs,        data, nvs,      , 0x6000,\n"
                  "otadata,    data, ota,      , 0x2000,\n"
                  "phy_init,   data, phy,      , 0x1000,\n"
                  "ota_0,      app,  ota_0,    , 1600K,\n"
                  "ota_1,      app,  ota_1,    , 1600K,\n"
                  "web_storage,data, spiffs,   , 200K,\n"
                  "rcp_fw,     data, spiffs,   , 320K,\n"
              )
          PY

      - name: Build the RCP image
        env:
          IDF_PATH: ${{ github.workspace }}/esp-idf
        run: |
          source "$IDF_PATH/export.sh"
          cd "$IDF_PATH/examples/openthread/ot_rcp"
          idf.py set-target esp32h2
          idf.py build

      - name: Build the border router image
        env:
          IDF_PATH: ${{ github.workspace }}/esp-idf
        run: |
          set -euo pipefail
          source "$IDF_PATH/export.sh"

          BR_VER="commit-$(git -C "$GITHUB_WORKSPACE/esp-thread-br" rev-parse --short HEAD)"
          echo "$BR_VER" > "$GITHUB_WORKSPACE/esp-thread-br-src/examples/basic_thread_border_router/version.txt"

          cd "$GITHUB_WORKSPACE/esp-thread-br-src/examples/basic_thread_border_router"
          idf.py set-target esp32s3
          grep -E '^(CONFIG_OPENTHREAD_BR_START_WEB|CONFIG_OPENTHREAD_BR_SOFTAP_SETUP|CONFIG_EXAMPLE_CONNECT_WIFI|CONFIG_EXAMPLE_CONNECT_ETHERNET|CONFIG_EXAMPLE_WIFI_CONN_MAX_RETRY|CONFIG_EXAMPLE_WIFI_SSID)=' sdkconfig || true
          if ! grep -q '^CONFIG_OPENTHREAD_BR_START_WEB=y$' sdkconfig; then
            echo "CONFIG_OPENTHREAD_BR_START_WEB=y was not resolved into sdkconfig" >&2
            exit 1
          fi
          idf.py fullclean build

      - name: Package merged binary
        id: package
        env:
          IDF_PATH: ${{ github.workspace }}/esp-idf
          FLASH_SIZE: ${{ inputs.flash_size }}
          MODE: ${{ inputs.mode }}
          WIFI_SETUP: ${{ inputs.wifi_setup }}
        run: |
          set -euo pipefail

          source "$IDF_PATH/export.sh"

          project_dir="$GITHUB_WORKSPACE/esp-thread-br-src/examples/basic_thread_border_router"
          build_dir="$project_dir/build"
          dist_dir="$GITHUB_WORKSPACE/dist"

          mkdir -p "$dist_dir"

          if [ "$MODE" = "wifi" ]; then
            asset_name="esp-thread-br-${FLASH_SIZE}-${MODE}-${WIFI_SETUP}.bin"
          else
            asset_name="esp-thread-br-${FLASH_SIZE}-${MODE}.bin"
          fi
          export ASSET_NAME="$asset_name"
          echo "ASSET_NAME=$asset_name" >> "$GITHUB_ENV"
          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"

          python3 - <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import sys

          build_dir = pathlib.Path(os.environ["GITHUB_WORKSPACE"]) / "esp-thread-br-src" / "examples" / "basic_thread_border_router" / "build"
          dist_dir = pathlib.Path(os.environ["GITHUB_WORKSPACE"]) / "dist"
          asset_name = os.environ["ASSET_NAME"]
          output_path = dist_dir / asset_name

          flasher_args = json.loads((build_dir / "flasher_args.json").read_text())
          flash_files = sorted(flasher_args["flash_files"].items(), key=lambda item: int(item[0], 16))

          command = [sys.executable, "-m", "esptool", "--chip", "esp32s3", "merge_bin", "-o", str(output_path)]
          for offset, relative_path in flash_files:
              command.extend([offset, str(build_dir / relative_path)])

          subprocess.run(command, check=True)
          PY

          ls -lah "$dist_dir"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.asset_name }}
          path: |
            dist/*.bin
