name: Check for new ESP-IDF release

on:
  schedule:
    # Daily at 06:00 UTC — one API call, exits in seconds if nothing changed
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Get latest stable ESP-IDF release
        id: idf_latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release list --repo espressif/esp-idf --limit 20 --json tagName \
            | jq -r '.[].tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)
          echo "Latest ESP-IDF: $LATEST"
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Check if we already have an RCP build for this version
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="rcp-${{ steps.idf_latest.outputs.version }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release for $TAG — triggering build."
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger RCP firmware build
        if: steps.release_check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run build-rcp-firmware.yml \
            --repo "$GITHUB_REPOSITORY" \
            --field idf_version="${{ steps.idf_latest.outputs.version }}"
